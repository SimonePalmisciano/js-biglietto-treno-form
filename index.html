<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <meta name="author" content="Simone Palmisciano">

    <!-- NOME TITOLO DOCUMENTO -->
    <title>Document</title>

    <!-- ICONA DOCUMENTO -->
    <link rel="icon" href="">

    <!-- LINK CSS BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <!-- LINK FOGLIO DI STILE CSS -->
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="text-center">
    <main>
        <div class="container-lg outer-wrapper d-flex flex-column justify-content-center">
            <div class="row form-wrapper align-items-center justify-content-center">
                <h1 class="titolo" id="titolo">
                    CALCOLA IL PREZZO DEL BIGLIETTO
                </h1>
                <div class="col-12 col-lg-6 form-background" id="formControl">
                    <form action="" id="formBiglietto" class="m-4 p-2 text-white">
                        <div class="my-1">
                            <label for="inputNameSurname" class="form-label">
                                Nome e Cognome
                            </label>
                            <input type="text" class="form-control" id="inputNameSurname"
                                placeholder="Inserisci Nome e Cognome">
                        </div>
                        <div class="my-1">
                            <label for="inputKm" class="form-label">
                                km da percorrere
                            </label>
                            <input type="text" class="form-control" id="inputKm" placeholder="Inserisci km">
                        </div>
                        <div class="my-1">
                            <label for="selectAge" class="form-label">
                                Fascia di Età
                            </label>
                            <select id="selectAge" class="form-select">
                                <option value="underage">
                                    minorenne
                                </option>
                                <option value="adult">
                                    maggiorenne
                                </option>
                                <option value="over65">
                                    over 65
                                </option>
                            </select>
                        </div>
                        <div class="my-3 text-center btn-container">
                            <button id="btnConferma" class="btn btn-primary">
                                Conferma
                            </button>
                            <button id="btnAnnulla" class="btn btn-primary">
                                Annulla
                            </button>
                        </div>
                    </form>
                </div>

                <!-- mostra il biglietto una volta compilato il form -->
                <div class="biglietto-completo mt-5 d-none" id="bigliettoMostrato">
                    <h2>
                        IL TUO BIGLIETTO
                    </h2>
                    <div class="row g-0 align-items-stretch">
                        <!-- COLONNA SINISTRA: DATA -->
                        <div class="col-12 col-md-3 ticket-col ticket-left d-flex flex-column justify-content-between">
                            <div>
                                <h5 class="ticket-label">
                                    Data
                                </h5>
                                <p id="displayData" class="ticket-value"></p>
                            </div>

                            <div class="mt-4">
                                <h6 class="ticket-small-label">
                                    Codice
                                </h6>
                                <p class="ticket-small-value">
                                    TRN-2045
                                </p>
                            </div>
                        </div>

                        <!-- COLONNA CENTRALE: NOME IN ALTO, PREZZO + ETÀ IN BASSO -->
                        <div
                            class="col-12 col-md-6 ticket-col ticket-center d-flex flex-column justify-content-between">
                            <div>
                                <h5 class="ticket-label">
                                    Passeggero
                                </h5>
                                <p id="displayName" class="ticket-passenger-name"></p>
                            </div>

                            <div class="d-flex flex-column flex-sm-row justify-content-between gap-3 mt-4">
                                <div class="flex-fill">
                                    <h6 class="ticket-label">
                                        Fascia di età
                                    </h6>
                                    <p id="displayAge" class="ticket-value"></p>
                                </div>
                                <div class="flex-fill text-sm-end">
                                    <h6 class="ticket-label">
                                        Prezzo
                                    </h6>
                                    <p id="displayPrice" class="ticket-price"></p>
                                </div>
                            </div>
                        </div>

                        <!-- COLONNA DESTRA: DIREZIONE + POSTO -->
                        <div class="col-12 col-md-3 ticket-col ticket-right d-flex flex-column justify-content-between">
                            <div class="mb-3">
                                <h5 class="ticket-label text-center">
                                    Direzione
                                </h5>
                                <p class="ticket-value text-center">
                                    Verso la fine
                                </p>
                            </div>

                            <div class="mt-3">
                                <h5 class="ticket-label text-center">
                                    Posto
                                </h5>
                                <p class="ticket-seat text-center">
                                    22C
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>





    <!-- LINK SCRIPT -->
    <script src="./scripts/function.js"></script>
    <script src="./scripts/script.js"></script>

    <!-- LINK BOOTSTRAP SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
